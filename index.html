<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя косметика</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f2ee;
    font-family: 'DM Sans', sans-serif;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 36px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .table-wrap {
    max-width: 1080px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #1a1a1a; color: #fff; }
  thead th {
    padding: 13px 16px;
    font-size: 0.71rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    text-align: left;
  }
  thead th.img-head { text-align: center; width: 80px; }
  thead th.drag-head { width: 36px; }

  tbody tr {
    border-bottom: 1px solid #f0ece6;
    transition: background 0.12s;
    cursor: default;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f5; }
  tbody tr.dragging {
    opacity: 0.45;
    background: #f0ece6;
  }
  tbody tr.drag-over {
    background: #eef5ff;
    border-top: 2px solid #7aaaff;
  }

  td { padding: 12px 16px; vertical-align: middle; font-size: 0.86rem; }

  .drag-handle {
    cursor: grab;
    color: #ccc;
    font-size: 1.1rem;
    user-select: none;
    text-align: center;
    padding: 12px 8px;
    transition: color 0.15s;
  }
  .drag-handle:hover { color: #888; }
  .drag-handle:active { cursor: grabbing; }

  .name { font-weight: 600; font-size: 0.9rem; color: #111; }
  .brand { font-size: 0.72rem; color: #aaa; display: block; margin-top: 3px; }

  .img-cell { text-align: center; padding: 8px 4px; width: 80px; }
  .img-wrapper {
    width: 60px; height: 60px;
    margin: 0 auto;
    border-radius: 10px;
    background: #f0ede9;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .img-wrapper img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .img-fallback { font-size: 0.58rem; font-weight: 700; color: #aaa; text-align: center; line-height: 1.4; padding: 6px; }

  .desc { color: #3a3a3a; line-height: 1.56; font-size: 0.83rem; width: 33%; }
  .comment-cell { padding: 10px 12px; width: 29%; }

  textarea {
    width: 100%; min-height: 62px;
    border: 1.5px solid #e5e1db;
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: #333;
    background: #fdfcfa;
    resize: vertical; outline: none;
    transition: border-color 0.2s, background 0.2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: #a09080; background: #fff; }
  textarea::placeholder { color: #ccc; font-style: italic; }
</style>
</head>
<body>

<h1>Моя косметика</h1>
<p class="subtitle">12 средств · уход за кожей</p>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="drag-head"></th>
        <th style="width:18%">Название</th>
        <th class="img-head">Фото</th>
        <th>Состав / действие</th>
        <th>Комментарий косметолога</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const products = [
  {
    name: "Anthelios UVMune 400 SPF50+",
    brand: "La Roche-Posay",
    img: "https://www.laroche-posay.com/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-lrp-master-catalog/default/dw39c35e10/products/anthelios/antheliosuvmune400invisiblefluid/3337875587327-LRP-Anthelios-UVMune-400-Invisible-Fluid-SPF50-F.jpg",
    desc: "SPF50+. Фильтры: Mexoryl 400 (UVA1, до 400нм), Tinosorb S/M (UVA/UVB). Флюид. Без отдушки, без спирта. 50 мл."
  },
  {
    name: "A-Game⁵ 0.05% Retinal",
    brand: "Geek & Gorgeous",
    img: "https://www.geekandgorgeous.com/cdn/shop/products/A-Game5_30ml_Front.jpg",
    desc: "Ретиналь (ретинальдегид) 0.05%. Альдегидная форма витамина A, прямой предшественник ретиноевой кислоты. 30 мл."
  },
  {
    name: "B-Bomb 10% Niacinamide",
    brand: "Geek & Gorgeous",
    img: "https://www.geekandgorgeous.com/cdn/shop/products/BBomb_30ml_Front.jpg",
    desc: "Ниацинамид 10% (витамин B3). Ингибирует перенос меланосом, регулирует себопродукцию, укрепляет керамидный барьер. 30 мл."
  },
  {
    name: "aPAD 20% Azeclair",
    brand: "Geek & Gorgeous",
    img: "https://www.geekandgorgeous.com/cdn/shop/products/aPAD_30ml_Front.jpg",
    desc: "Азелаиновая кислота 20% (форма Azeclair — потенцированный эфир). Антибактериальное, кератолитическое, депигментирующее действие. 30 мл."
  },
  {
    name: "Эффезел гель",
    brand: "Galderma",
    img: "https://www.galderma.com/sites/default/files/2021-09/effezell.jpg",
    desc: "Рецептурный. Адапален 0.1% (ретиноид 3-го поколения) + бензоилпероксид 2.5%. Антикомедонное + антибактериальное."
  },
  {
    name: "Retin A Renewal Night Cream",
    brand: "GIGI Promedic",
    img: "https://gigicosmetic.com/cdn/shop/products/retin-a-renewal-night-cream.jpg",
    desc: "Ретинол (концентрация на упаковке не указана). Ночной крем, профессиональная линия."
  },
  {
    name: "Acne Reversing Gel BPO 10%",
    brand: "M.A.D Skincare",
    img: "https://mad-skincare.com/cdn/shop/files/MAD_ARG10_MAIN.jpg",
    desc: "Бензоилпероксид 10%. Антибактериальный окислитель. Высокая концентрация — для точечного нанесения. 30 мл."
  },
  {
    name: "Cicaplast Baume B5+",
    brand: "La Roche-Posay",
    img: "https://www.laroche-posay.com/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-lrp-master-catalog/default/dw94c15095/products/cicaplast/cicaplastbaumeb5/LRP_Cicaplast_Baume_B5_100ml_3337875546447.jpg",
    desc: "Пантенол (B5), мадекассосид, термальная вода LRP. Без отдушки. Восстановление барьера, ранозаживляющее действие."
  },
  {
    name: "Calm Down 3.2% PHA + 0.8% BHA",
    brand: "Geek & Gorgeous",
    img: "https://www.geekandgorgeous.com/cdn/shop/products/CalmDown_100ml_Front.jpg",
    desc: "Глюконолактон 3.2% (PHA) + салициловая кислота 0.8% (BHA). Химический эксфолиант. pH ≈3.5. 100 мл."
  },
  {
    name: "Toleriane Sensitive Fluide",
    brand: "La Roche-Posay",
    img: "https://www.laroche-posay.com/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-lrp-master-catalog/default/dwd2a9c45b/products/toleriane/tolerianesensitive/LRP_TolSens_Fluide_40ml_3337875545570.jpg",
    desc: "Термальная вода, нейросенсин, глицерин. Без парабенов, без отдушки. Лёгкий флюид. pH ≈5.5. 40 мл."
  },
  {
    name: "Cicaplast Baume B5+ SPF50",
    brand: "La Roche-Posay",
    img: "https://www.laroche-posay.com/dw/image/v2/AANG_PRD/on/demandware.static/-/Sites-lrp-master-catalog/default/dw6c1e6b42/products/cicaplast/cicaplastbaumeb5uv/3337875786690-LRP-CICAPLAST-BAUME-B5-UV-SPF50-40ML.jpg",
    desc: "Пантенол B5 + мадекассосид + SPF50 (химические фильтры). Восстановление + фотозащита. 40 мл."
  },
  {
    name: "Körperlotion Body Lotion",
    brand: "KLAPP (Ref. 1834)",
    img: "https://klapp-cosmetics.com/media/catalog/product/cache/5/image/400x/9df78eab33525d08d6e5fb8d27136e95/1/0/10310100_2.jpg",
    desc: "Лосьон для тела. Полный состав не раскрыт. KLAPP Cosmetics GmbH, Hessisch Lichtenau, DE."
  }
];

const tbody = document.getElementById('tbody');

function buildRow(p) {
  const tr = document.createElement('tr');
  tr.draggable = true;

  // Drag handle
  const tdHandle = document.createElement('td');
  tdHandle.className = 'drag-handle';
  tdHandle.innerHTML = '&#8597;';
  tdHandle.title = 'Перетащить';
  tr.appendChild(tdHandle);

  // Name
  const tdName = document.createElement('td');
  tdName.innerHTML = `<span class="name">${p.name}</span><span class="brand">${p.brand}</span>`;
  tr.appendChild(tdName);

  // Image
  const tdImg = document.createElement('td');
  tdImg.className = 'img-cell';
  const wrapper = document.createElement('div');
  wrapper.className = 'img-wrapper';
  const img = document.createElement('img');
  img.alt = p.name;
  img.src = p.img;
  img.onerror = function() {
    this.parentNode.innerHTML = `<span class="img-fallback">${p.brand}</span>`;
  };
  wrapper.appendChild(img);
  tdImg.appendChild(wrapper);
  tr.appendChild(tdImg);

  // Desc
  const tdDesc = document.createElement('td');
  tdDesc.className = 'desc';
  tdDesc.textContent = p.desc;
  tr.appendChild(tdDesc);

  // Comment
  const tdComm = document.createElement('td');
  tdComm.className = 'comment-cell';
  const ta = document.createElement('textarea');
  ta.placeholder = 'Комментарий…';
  tdComm.appendChild(ta);
  tr.appendChild(tdComm);

  return tr;
}

products.forEach(p => tbody.appendChild(buildRow(p)));

// ── Drag-and-drop ──
let dragSrc = null;

tbody.addEventListener('dragstart', e => {
  dragSrc = e.target.closest('tr');
  if (!dragSrc) return;
  dragSrc.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});

tbody.addEventListener('dragend', e => {
  document.querySelectorAll('tr.dragging, tr.drag-over').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  dragSrc = null;
});

tbody.addEventListener('dragover', e => {
  e.preventDefault();
  const target = e.target.closest('tr');
  if (!target || target === dragSrc) return;
  document.querySelectorAll('tr.drag-over').forEach(el => el.classList.remove('drag-over'));
  target.classList.add('drag-over');
  e.dataTransfer.dropEffect = 'move';
});

tbody.addEventListener('dragleave', e => {
  const target = e.target.closest('tr');
  if (target) target.classList.remove('drag-over');
});

tbody.addEventListener('drop', e => {
  e.preventDefault();
  const target = e.target.closest('tr');
  if (!target || target === dragSrc || !dragSrc) return;
  target.classList.remove('drag-over');

  const rows = [...tbody.querySelectorAll('tr')];
  const srcIdx = rows.indexOf(dragSrc);
  const tgtIdx = rows.indexOf(target);

  if (srcIdx < tgtIdx) {
    tbody.insertBefore(dragSrc, target.nextSibling);
  } else {
    tbody.insertBefore(dragSrc, target);
  }
});
</script>
</body>
</html>
